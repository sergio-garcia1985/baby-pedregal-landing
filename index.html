    // Creating Lucide Icon fallback components since UMD might expose them differently. 
    // Lucide exposes lucide global API. The safest way is to use its built-in createIcons on a div or just dangerouslySetInnerHTML since we control the inputs.
    const Icon = ({ name, size = 24, className = "" }) => {
      const iconRef = window.React.useRef(null);
      
      window.React.useEffect(() => {
        if (iconRef.current && window.lucide) {
          // lucide.createIcons replaces [data-lucide] attributes
          iconRef.current.innerHTML = `<i data-lucide="${name.replace(/([A-Z])/g, "-$1").toLowerCase().replace(/^-/, '')}" class="${className}" width="${size}" height="${size}"></i>`;
          window.lucide.createIcons({
             root: iconRef.current,
             icons: window.lucide.icons
          });
        }
      }, [name, size, className]);

      return <span ref={iconRef} className="inline-block" style={{ width: size, height: size }} />;
    };

    // Helper components to map to what we used
    const Phone = (props) => <Icon name="Phone" {...props} />;
    const MessageCircle = (props) => <Icon name="MessageCircle" {...props} />;
